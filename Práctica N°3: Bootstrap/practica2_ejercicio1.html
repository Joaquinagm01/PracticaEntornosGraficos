<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 2 - Ejercicio 1: Sistema de Grilla</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="estilo.css">
    <style>
        .columna {
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 5px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }
        .col1 { background-color: #9b7bb4; }
        .col2 { background-color: #e8c9a1; }
        .col3 { background-color: #d495a0; }
    </style>
</head>
<body class="p-4">
    <h2 class="mb-4">Ejercicio 1: Sistema de Grilla</h2>
    
    <div class="container">
        <!-- Primera fila: 1 columna al 100% (excepto sm) -->
        <div class="row mb-3">
            <div class="col-12 col-sm-12 columna col1">
                Columna 1 (100%)
            </div>
        </div>

        <!-- Segunda fila: 2 columnas al 50% (excepto sm) -->
        <div class="row">
            <div class="col-12 col-sm-12 col-md-6 columna col2">
                Columna 2 (50%)
            </div>
            <div class="col-12 col-sm-12 col-md-6 columna col3">
                Columna 3 (50%)
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
