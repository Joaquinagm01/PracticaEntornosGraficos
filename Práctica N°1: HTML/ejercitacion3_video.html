<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f7fb;
      font-family: Arial, sans-serif;
      color: #1f2933;
    }

    .panel {
      width: min(760px, 92vw);
      background: #ffffff;
      border: 1px solid #d8e1ea;
      border-radius: 12px;
      padding: 18px;
    }

    h1 {
      margin-top: 0;
      font-size: 1.4rem;
    }

    video {
      width: 100%;
      border-radius: 10px;
      background: #000;
    }
  </style>
</head>
<body>
  <main class="panel">

    <video controls>
      <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4" />
      <source src="https://www.w3schools.com/html/mov_bbb.ogg" type="video/ogg" />
      Tu navegador no soporta la etiqueta de video.
    </video>
  </main>
</body>
</html>
