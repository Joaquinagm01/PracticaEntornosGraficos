<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reproducir - Crazy Frog</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f3f6fa;
      color: #1f2933;
    }

    .panel {
      width: min(420px, 92vw);
      background: #fff;
      border: 1px solid #d9e2ec;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .controls {
      margin-top: 12px;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    button {
      width: 56px;
      height: 56px;
      border: 1px solid #c5d1dd;
      border-radius: 50%;
      background: #eef4fa;
      cursor: pointer;
      font-size: 1.35rem;
      font-weight: 700;
      display: grid;
      place-items: center;
    }

    button:hover {
      background: #dde9f6;
    }

    .yt-player {
      width: 1px;
      height: 1px;
      border: 0;
      opacity: 0;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Reproducir</h1>

    <div class="controls">
      <button id="toggle-btn" type="button" aria-label="Reproducir o pausar">▶</button>
    </div>

    <iframe id="yt-player" class="yt-player" title="Crazy Frog audio" allow="autoplay; encrypted-media"></iframe>
  </main>

  <script>
    const ytPlayer = document.getElementById("yt-player");
    const toggleBtn = document.getElementById("toggle-btn");
    const audioUrl = "https://www.youtube.com/embed/k85mRPqvMbE?autoplay=1&controls=0&rel=0&playsinline=1";
    let isPlaying = false;

    toggleBtn.addEventListener("click", () => {
      if (!isPlaying) {
        ytPlayer.src = audioUrl;
        toggleBtn.textContent = "❚❚";
        toggleBtn.setAttribute("aria-label", "Pausar");
        isPlaying = true;
      } else {
        ytPlayer.src = "";
        toggleBtn.textContent = "▶";
        toggleBtn.setAttribute("aria-label", "Reproducir");
        isPlaying = false;
      }
    });
  </script>
</body>
</html>
